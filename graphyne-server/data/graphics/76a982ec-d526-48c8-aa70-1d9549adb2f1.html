
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breaking News</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        .container { width: 1920px; height: 1080px; position: relative; }

        .ticker-box {
            position: absolute; top: 80px; right: 80px;
            background: #cc0000; color: white;
            padding: 20px 40px; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(200,0,0,0.4);
            display: flex; align-items: center; gap: 20px;
            opacity: 0; transform: scale(0.8);
        }

        .badge {
            font-weight: 900; font-size: 28px;
            background: white; color: #cc0000;
            padding: 5px 10px; border-radius: 4px;
        }

        .content { font-size: 28px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ticker-box">
            <div class="badge">LIVE</div>
            <div class="content">SYSTEM TEST IN PROGRESS</div>
        </div>
    </div>

    <script>
        const tl = gsap.timeline();

        function playIn() {
            tl.to(".ticker-box", { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.7)" })
              .to(".ticker-box", { boxShadow: "0 0 50px rgba(255,0,0,0.6)", duration: 0.8, yoyo: true, repeat: -1 });
        }

        function playOut() {
            tl.kill(); // Stop the pulsing loop
            gsap.to(".ticker-box", { opacity: 0, scale: 0.5, y: -50, duration: 0.4, ease: "back.in(1.7)" });
        }

        window.addEventListener('message', (event) => {
            if (event.data === 'stop' || event.data === 'out') playOut();
        });

        playIn();
    </script>
</body>
</html>
