
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
        }

        .graphic-group {
            position: absolute;
            bottom: 100px;
            left: 150px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .name-bar {
            background: linear-gradient(90deg, #0055ff, #003399);
            color: white;
            padding: 15px 40px;
            font-size: 42px;
            font-weight: 800;
            text-transform: uppercase;
            transform: translateX(-120%);
            /* Start hidden */
        }

        .title-bar {
            background: rgba(0, 0, 0, 0.8);
            color: #ccc;
            padding: 8px 40px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            width: fit-content;
            transform: translateX(-120%);
            /* Start hidden */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="graphic-group">
            <div class="name-bar">Walter Cronkite</div>
            <div class="title-bar">Lead Anchor</div>
        </div>
    </div>

    <script>
        const tl = gsap.timeline();

        // 1. IN ANIMATION (Auto-run)
        function playIn() {
            tl.to(".name-bar", { x: 0, duration: 0.8, ease: "power3.out" })
                .to(".title-bar", { x: 0, duration: 0.8, ease: "power3.out" }, "-=0.6");
        }

        // 2. OUT ANIMATION (Called via command)
        function playOut() {
            // Check if timeline is active to prevent conflicts
            if (tl.isActive()) tl.progress(1);

            gsap.to(".title-bar", { x: -50, opacity: 0, duration: 0.4, ease: "power2.in" });
            gsap.to(".name-bar", { x: -100, opacity: 0, duration: 0.4, ease: "power2.in", delay: 0.1 });
        }

        // 3. COMMAND LISTENER
        window.addEventListener('message', (event) => {
            const cmd = event.data;
            if (cmd === 'stop' || cmd === 'out') playOut();
            if (cmd === 'play') playIn();
        });

        playIn();
    </script>
</body>

</html>
