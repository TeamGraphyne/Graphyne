version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: graphyne-postgres-dev
    environment:
      POSTGRES_USER: graphyne
      POSTGRES_PASSWORD: graphyne
      POSTGRES_DB: graphyne
    ports:
      - '5432:5432'
    volumes: 
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: