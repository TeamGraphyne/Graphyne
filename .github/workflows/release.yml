name: Graphyne Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '20'

jobs:
  build-tauri:
    name: Build — ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: graphyne-linux
            artifact-path: |
              graphyne-launcher/src-tauri/target/release/bundle/appimage/*.AppImage
              graphyne-launcher/src-tauri/target/release/bundle/deb/*.deb

          - platform: windows-latest
            artifact-name: graphyne-windows
            artifact-path: |
              graphyne-launcher/src-tauri/target/release/bundle/msi/*.msi
              graphyne-launcher/src-tauri/target/release/bundle/nsis/*.exe

          - platform: macos-latest
            artifact-name: graphyne-macos
            artifact-path: |
              graphyne-launcher/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building version $VERSION"
          # Update tauri.conf.json
          sed -i "s/\"version\": \"[^\"][^\"]*\"/\"version\": \"$VERSION\"/" \
            graphyne-launcher/src-tauri/tauri.conf.json
          # Update server package.json too so they stay in sync
          sed -i "s/\"version\": \"[^\"][^\"]*\"/\"version\": \"$VERSION\"/" \
            graphyne-server/package.json

      # Tauri 2.x on Linux uses webkit2gtk-4.1 and libsoup3
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './graphyne-launcher/src-tauri -> target'

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            graphyne-client/package-lock.json
            graphyne-server/package-lock.json

      # ── Step 1: Build the React client ───────────────────────────────────────
      - name: Install client dependencies
        working-directory: ./graphyne-client
        run: npm ci

      - name: Build client
        working-directory: ./graphyne-client
        run: npm run build

      # ── Step 2 & 3: Compile server + pkg binary ───────────────────────────────
      - name: Install server dependencies
        working-directory: ./graphyne-server
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./graphyne-server
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./data/ci.db"

      - name: Build server TypeScript
        working-directory: ./graphyne-server
        run: npm run build

      - name: Build server binary (sidecar)
        working-directory: ./graphyne-server
        run: node scripts/build-sidecar.js

      # ── Step 4: Copy client contents into Tauri resources ────────────────────
      - name: Copy client dist → Tauri resources (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p graphyne-launcher/src-tauri/client
          cp -r graphyne-client/dist/* graphyne-launcher/src-tauri/client/

      - name: Copy client dist → Tauri resources (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force graphyne-launcher\src-tauri\client
          Copy-Item -Recurse graphyne-client\dist\* graphyne-launcher\src-tauri\client\

      # ── Step 5: Install launcher deps ────────────────────────────────────────
      - name: Install launcher dependencies
        working-directory: ./graphyne-launcher
        run: npm ci

      # ── Step 6: Tauri build ───────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./graphyne-launcher
          tagName: ${{ github.ref_name }}
          releaseName: 'Graphyne ${{ github.ref_name }}'
          releaseBody: |
            ## Graphyne ${{ github.ref_name }}

            - **Windows:** Download the `.exe` or `.msi` installer
            - **macOS:** Download the `.dmg`
            - **Linux:** Download the `.AppImage` or `.deb`
          releaseDraft: true
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 14