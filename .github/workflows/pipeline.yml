name: Graphyne CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: '20'

jobs:
  # --- CLIENT CHECKS ---
  client-ci:
    name: Client (Build & Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./graphyne-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Caches npm dependencies based on the lock file
          cache: 'npm'
          cache-dependency-path: graphyne-client/package-lock.json

      - name: Install Client Dependencies
        run: npm ci

      - name: Lint Client
        run: npm run lint

      - name: Build Client
        run: npm run build

      - name: Upload Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: graphyne-client/dist
          retention-days: 5

  # --- SERVER CHECKS ---
  server-ci:
    name: Server (Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./graphyne-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: graphyne-server/package-lock.json

      - name: Install Server Dependencies
        run: npm ci

      - name: Build Server
        run: npm run build

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: graphyne-server/dist
          retention-days: 5