# Fires on push to dev/main and on every PR — the build gate
# Replaces the old pipeline.yml
name: Graphyne CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: '20'

jobs:
  # ─── CLIENT ────────────────────────────────────────────────
  client-ci:
    name: Client — Lint, Type Check, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./graphyne-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: graphyne-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Vite's build doesn't surface all TS errors — run tsc separately
      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: graphyne-client/dist
          retention-days: 5

  # ─── SERVER ────────────────────────────────────────────────
  server-ci:
    name: Server — Prisma, Type Check, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./graphyne-server

    env:
      # SQLite — file path relative to graphyne-server/
      DATABASE_URL: "file:./data/graphyne-ci.db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: graphyne-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Generates the Prisma client from schema.prisma
      # Fails if schema has syntax errors or unsupported features
      - name: Generate Prisma client
        run: npx prisma generate

      # Applies migrations to a fresh SQLite file
      # Fails if any migration is broken or inconsistent
      - name: Run database migrations
        run: npx prisma migrate deploy

      # Compile TypeScript — fails on any type error
      - name: Build server
        run: npm run build

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: graphyne-server/dist
          retention-days: 5